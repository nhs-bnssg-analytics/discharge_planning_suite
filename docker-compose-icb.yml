version: '3.7'
services:
  forecast:
    cap_add:
      - SYS_RESOURCE
    oom_score_adj: -1000
    build:
      context: .           
      dockerfile: Dockerfile-icb 
    restart: always
    environment:
        - DB_HOST
        - DB_NAME
        - DB_USER
        - DB_CRED
    volumes:
      - /samba/nowcast-data/dpp/data:/root/data
      - /home/rshiny:/root/sql
    image: dps_forecast_v1
